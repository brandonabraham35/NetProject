version: '3.8'

services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-netflix_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-netflix_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netflix_user -d netflix_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:80}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - DB_USER=${POSTGRES_USER:-netflix_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-password}
      - DB_NAME=${POSTGRES_DB:-netflix_db}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
